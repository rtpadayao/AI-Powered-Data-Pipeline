# ============================================
# dbt Project Configuration
# Purpose: Define project structure & defaults
# ============================================

name: financial_pipeline
version: 1.0.0
config-version: 2

profile: default

source-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_modules"]

models:
  financial_pipeline:
    staging:
      +schema: staging
      +materialized: view
    refined:
      +schema: refined
      +materialized: incremental
    marts:
      +schema: marts
      +materialized: incremental