# =============================================================
#  Automated Data Pipeline — Docker Compose
#  Stack: PostgreSQL · pgAdmin · Airflow · FastAPI · dbt
#
#  Fixes applied vs original:
#    - Removed deprecated 'version' key (Compose v2 ignores it)
#    - Added restart policies on all long-running services
#    - Added airflow-init one-shot service (db migrate + user create)
#    - Fixed dbt profiles mount (no more ~/.dbt host path dependency)
#    - Pinned dbt image to specific version (no more :latest)
#    - Added dbt command (run) and restart: no (one-shot)
#    - Added pgadmin_data named volume (saves server config)
#    - Removed postgres port exposure (internal only, safer)
#    - Added .env.example companion file guidance in comments
#    - Added depends_on: airflow-init for webserver + scheduler
#    - Added healthchecks on airflow-webserver and fastapi
#    - Separated dbt profiles.yml from host machine path
#    - Added AIRFLOW__WEBSERVER__SECRET_KEY for session security
# =============================================================

# ── Reusable blocks ───────────────────────────────────────────

x-airflow-common: &airflow-common
  image: apache/airflow:2.10.0
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    # Connection for dbt / FastAPI to reach postgres via Airflow connections
    AIRFLOW_CONN_POSTGRES_DEFAULT: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
  volumes: &airflow-volumes
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    # Give Airflow access to dbt project so it can trigger dbt runs
    - ./dbt_project:/opt/airflow/dbt
    # Give Airflow access to API extract_load module
    - ./api:/opt/airflow/api
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - data_net

# ── Services ─────────────────────────────────────────────────

services:

  # ------------------------------------------------------------
  # 1. PostgreSQL — metastore for Airflow + data warehouse
  # ------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Port intentionally NOT exposed to host for security.
    # Connect via pgAdmin (port 5050) or add "ports" back for local dev:
    #   ports:
    #     - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Optional: place SQL init scripts here to create extra DBs on first run
      # - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - data_net

  # ------------------------------------------------------------
  # 2. pgAdmin — database GUI
  # ------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:8.6
    container_name: pgadmin_gui
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"        # single-user mode (desktop-like)
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      # Persists saved server connections across restarts (was missing before)
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data_net

  # ------------------------------------------------------------
  # 3. Airflow init — one-shot: migrate DB + create admin user
  #    Runs ONCE on first startup, then exits (restart: on-failure)
  #    webserver + scheduler wait for this to complete successfully
  # ------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    restart: on-failure
    command:
      - bash
      - -c
      - airflow db migrate && airflow users create --username ${AIRFLOW_ADMIN_USER:-admin} --password ${AIRFLOW_ADMIN_PASSWORD:-admin} --firstname Admin --lastname User --role Admin --email ${AIRFLOW_ADMIN_EMAIL:-admin@example.com} && echo 'Airflow initialized successfully'
    # Override depends_on — init only needs postgres, not itself
    depends_on:
      postgres:
        condition: service_healthy

  # ------------------------------------------------------------
  # 4. Airflow Webserver — UI at localhost:8080
  # ------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    restart: unless-stopped
    command: webserver
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # ------------------------------------------------------------
  # 5. Airflow Scheduler — executes DAGs
  # ------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    restart: unless-stopped
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # ------------------------------------------------------------
  # 6. FastAPI — application / OCR API service
  # ------------------------------------------------------------
  fastapi:
    build:
      context: ./api
      # Use build targets to toggle dev vs prod behaviour in your Dockerfile:
      #   target: development   (includes bind mount, hot reload)
      #   target: production    (baked-in code, no mount)
      target: ${FASTAPI_BUILD_TARGET:-development}
    container_name: fastapi_app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      APP_ENV: ${APP_ENV:-development}
      CSV_PATH: /data/raw_gl_dr_cr_noAmount.csv
    ports:
      - "8000:8000"
    volumes:
      # Bind mount only in development for live reload.
      # In production set FASTAPI_BUILD_TARGET=production and remove this.
      - ./api:/app
      - ./infrastructure/raw_storage:/data:ro
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data_net

  # ------------------------------------------------------------
  # 7. dbt — transformation service (one-shot runner)
  #    Triggered by Airflow BashOperator/DockerOperator in DAGs,
  #    NOT as a persistent always-on service.
  #    To run manually: docker compose run --rm dbt run
  # ------------------------------------------------------------
  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.9.0     # pinned — never use :latest
    container_name: dbt_core
    restart: "no"                                   # one-shot — exits after run
    environment:
      DBT_DB_USER: ${DB_USER}
      DBT_DB_PASS: ${DB_PASSWORD}
      DBT_DB_NAME: ${DB_NAME}
      DBT_DB_HOST: postgres
      DBT_DB_PORT: "5432"
      DBT_DB_SCHEMA: ${DBT_SCHEMA:-public}
    volumes:
      - ./dbt_project:/usr/app                      # dbt project files
      # profiles.yml lives in repo — no host ~/.dbt dependency
      - ./dbt_project/profiles.yml:/root/.dbt/profiles.yml:ro
    working_dir: /usr/app
    command: run                            # override with 'test', 'docs generate' etc.
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data_net

# ── Networks ─────────────────────────────────────────────────

networks:
  data_net:
    driver: bridge
    # Optional: restrict inter-container communication further in production
    # by splitting into frontend (fastapi, pgadmin) and backend (postgres, airflow) subnets

# ── Volumes ──────────────────────────────────────────────────

volumes:
  postgres_data:      # PostgreSQL data — persists across restarts
  pgadmin_data:       # pgAdmin server config — persists saved connections